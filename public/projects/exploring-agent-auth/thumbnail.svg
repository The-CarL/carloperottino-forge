<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#e07a3c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e07a3c" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="112" x2="800" y2="112"/>
    <line x1="0" y1="225" x2="800" y2="225"/>
    <line x1="0" y1="338" x2="800" y2="338"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
  </g>

  <!-- Warm glow behind robot -->
  <ellipse cx="170" cy="250" rx="120" ry="140" fill="url(#glow)"/>

  <!-- Robot body -->
  <g transform="translate(170, 225)">
    <!-- Antenna -->
    <line x1="0" y1="-68" x2="0" y2="-85" stroke="#e07a3c" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="-90" r="6" fill="#e07a3c" opacity="0.9"/>
    <circle cx="0" cy="-90" r="3" fill="#f0ece6"/>

    <!-- Head -->
    <rect x="-32" y="-65" width="64" height="50" rx="12" fill="#2a2a2a" stroke="#e07a3c" stroke-width="2"/>

    <!-- Eyes -->
    <circle cx="-12" cy="-42" r="8" fill="#111111"/>
    <circle cx="12" cy="-42" r="8" fill="#111111"/>
    <circle cx="-10" cy="-43" r="4" fill="#e07a3c"/>
    <circle cx="14" cy="-43" r="4" fill="#e07a3c"/>
    <!-- Eye shine -->
    <circle cx="-8" cy="-45" r="1.5" fill="#f0ece6" opacity="0.8"/>
    <circle cx="16" cy="-45" r="1.5" fill="#f0ece6" opacity="0.8"/>

    <!-- Mouth - little smile -->
    <path d="M-8,-28 Q0,-22 8,-28" stroke="#e07a3c" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Body -->
    <rect x="-28" y="-10" width="56" height="55" rx="8" fill="#2a2a2a" stroke="#e07a3c" stroke-width="2"/>

    <!-- Chest emblem - shield/lock icon -->
    <path d="M0,2 L-10,7 L-10,18 Q-10,25 0,28 Q10,25 10,18 L10,7 Z" fill="none" stroke="#e07a3c" stroke-width="1.5" opacity="0.6"/>
    <circle cx="0" cy="16" r="3" fill="#e07a3c" opacity="0.5"/>

    <!-- Left arm - waving -->
    <g transform="rotate(-25, -28, 5)">
      <rect x="-50" y="-2" width="24" height="14" rx="7" fill="#2a2a2a" stroke="#e07a3c" stroke-width="2"/>
    </g>

    <!-- Right arm - pointing right -->
    <g transform="rotate(8, 28, 15)">
      <rect x="28" y="8" width="28" height="14" rx="7" fill="#2a2a2a" stroke="#e07a3c" stroke-width="2"/>
      <!-- Pointing hand detail -->
      <circle cx="58" cy="15" r="4" fill="#2a2a2a" stroke="#e07a3c" stroke-width="1.5"/>
    </g>

    <!-- Legs -->
    <rect x="-18" y="48" width="14" height="20" rx="5" fill="#2a2a2a" stroke="#e07a3c" stroke-width="2"/>
    <rect x="4" y="48" width="14" height="20" rx="5" fill="#2a2a2a" stroke="#e07a3c" stroke-width="2"/>

    <!-- Feet -->
    <rect x="-22" y="65" width="20" height="8" rx="4" fill="#2a2a2a" stroke="#e07a3c" stroke-width="1.5"/>
    <rect x="2" y="65" width="20" height="8" rx="4" fill="#2a2a2a" stroke="#e07a3c" stroke-width="1.5"/>
  </g>

  <!-- Lock progression: 4 locks going from open/red to closed/green -->

  <!-- Lock 1: Open - red - NO AUTH (left leg raised, right stays seated) -->
  <g transform="translate(350, 200)">
    <path d="M-16,-38 L-16,-40 Q-16,-56 0,-56 Q16,-56 16,-40 L16,-20" stroke="#e05555" stroke-width="5" fill="none" stroke-linecap="round"/>
    <rect x="-22" y="-20" width="44" height="36" rx="6" fill="#e05555" opacity="0.9"/>
    <rect x="-22" y="-20" width="44" height="36" rx="6" fill="none" stroke="#ff6b6b" stroke-width="1.5"/>
    <circle cx="0" cy="-6" r="5" fill="#1a1a1a"/>
    <rect x="-2.5" y="-4" width="5" height="12" rx="1" fill="#1a1a1a"/>
    <text x="0" y="36" text-anchor="middle" fill="#f0ece6" font-family="monospace" font-size="11" opacity="0.7">01</text>
  </g>

  <!-- Lock 2: Partially open - orange - API KEY -->
  <g transform="translate(470, 200)">
    <path d="M-16,-28 L-16,-40 Q-16,-56 0,-56 Q16,-56 16,-40 L16,-20" stroke="#e09a3c" stroke-width="5" fill="none" stroke-linecap="round"/>
    <rect x="-22" y="-20" width="44" height="36" rx="6" fill="#e09a3c" opacity="0.9"/>
    <rect x="-22" y="-20" width="44" height="36" rx="6" fill="none" stroke="#f0aa4c" stroke-width="1.5"/>
    <circle cx="0" cy="-6" r="5" fill="#1a1a1a"/>
    <rect x="-2.5" y="-4" width="5" height="12" rx="1" fill="#1a1a1a"/>
    <text x="0" y="36" text-anchor="middle" fill="#f0ece6" font-family="monospace" font-size="11" opacity="0.7">03</text>
  </g>

  <!-- Lock 3: Nearly closed - yellow-green - OAUTH -->
  <g transform="translate(590, 200)">
    <path d="M-16,-26 L-16,-40 Q-16,-56 0,-56 Q16,-56 16,-40 L16,-20" stroke="#8bba42" stroke-width="5" fill="none" stroke-linecap="round"/>
    <rect x="-22" y="-20" width="44" height="36" rx="6" fill="#8bba42" opacity="0.9"/>
    <rect x="-22" y="-20" width="44" height="36" rx="6" fill="none" stroke="#9dcc54" stroke-width="1.5"/>
    <circle cx="0" cy="-6" r="5" fill="#1a1a1a"/>
    <rect x="-2.5" y="-4" width="5" height="12" rx="1" fill="#1a1a1a"/>
    <text x="0" y="36" text-anchor="middle" fill="#f0ece6" font-family="monospace" font-size="11" opacity="0.7">06</text>
  </g>

  <!-- Lock 4: Closed - green - FULL AUTH -->
  <g transform="translate(710, 200)">
    <path d="M-16,-20 L-16,-40 Q-16,-56 0,-56 Q16,-56 16,-40 L16,-20" stroke="#4aba6a" stroke-width="5" fill="none" stroke-linecap="round"/>
    <rect x="-22" y="-20" width="44" height="36" rx="6" fill="#4aba6a" opacity="0.9"/>
    <rect x="-22" y="-20" width="44" height="36" rx="6" fill="none" stroke="#5ccc7c" stroke-width="1.5"/>
    <path d="M-5,-4 L-1,2 L7,-8" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="36" text-anchor="middle" fill="#f0ece6" font-family="monospace" font-size="11" opacity="0.7">08</text>
  </g>

  <!-- Connecting arrow between locks -->
  <g stroke="#f0ece6" stroke-opacity="0.2" stroke-width="1.5" fill="none">
    <path d="M380,200 L440,200" marker-end="url(#arrow)"/>
    <path d="M500,200 L560,200" marker-end="url(#arrow)"/>
    <path d="M620,200 L680,200" marker-end="url(#arrow)"/>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 8 5 L 0 8" fill="none" stroke="#f0ece6" stroke-opacity="0.3" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- Arrow from robot to locks -->
  <path d="M230,230 Q280,210 330,200" stroke="#e07a3c" stroke-width="1.5" stroke-opacity="0.3" fill="none" stroke-dasharray="4,4"/>

  <!-- Bottom text -->
  <text x="530" y="290" text-anchor="middle" fill="#f0ece6" font-family="monospace" font-size="12" opacity="0.4">no auth  ...  full auth</text>

  <!-- Decorative dots -->
  <circle cx="50" cy="50" r="2" fill="#e07a3c" opacity="0.2"/>
  <circle cx="750" cy="50" r="2" fill="#e07a3c" opacity="0.2"/>
  <circle cx="50" cy="400" r="2" fill="#e07a3c" opacity="0.2"/>
  <circle cx="750" cy="400" r="2" fill="#e07a3c" opacity="0.2"/>
</svg>
